# Builds .dmg (macOS) and .msi (Windows) installers, signs them with the
# Tauri updater key, creates a GitHub release on THIS repo, and uploads
# the artifacts + a `latest.json` manifest the running app fetches to
# detect new versions.
#
# Trigger: pushing a tag like `v0.2.0`.
# Required secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY          — the contents of ~/.tauri/fisch-macro.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — the password you set when generating the key
#
# `GITHUB_TOKEN` is automatically provided by Actions and has the
# `contents: write` permission scoped via the `permissions:` block below.
# No PAT needed — release publishing happens in the same repo.

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Build & bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig dist/ || true
          else
            cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip dist/ || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig dist/ || true
          fi
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build update manifest
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="${GITHUB_REF_NAME} release"
          PUB_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          # Find the macOS .app.tar.gz + signature (arm64 preferred for Apple Silicon)
          MAC_ARM_SIG=$(cat artifacts/bundle-macos-arm64/*.app.tar.gz.sig 2>/dev/null | head -1 || echo "")
          MAC_ARM_FILE=$(basename $(ls artifacts/bundle-macos-arm64/*.app.tar.gz 2>/dev/null | head -1) 2>/dev/null || echo "")
          MAC_X64_SIG=$(cat artifacts/bundle-macos-x64/*.app.tar.gz.sig 2>/dev/null | head -1 || echo "")
          MAC_X64_FILE=$(basename $(ls artifacts/bundle-macos-x64/*.app.tar.gz 2>/dev/null | head -1) 2>/dev/null || echo "")

          # Find the Windows NSIS .nsis.zip + signature
          WIN_SIG=$(cat artifacts/bundle-windows-x64/*.nsis.zip.sig 2>/dev/null | head -1 || echo "")
          WIN_FILE=$(basename $(ls artifacts/bundle-windows-x64/*.nsis.zip 2>/dev/null | head -1) 2>/dev/null || echo "")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "${PUB_BASE}/${MAC_ARM_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${PUB_BASE}/${MAC_X64_FILE}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${PUB_BASE}/${WIN_FILE}"
              }
            }
          }
          EOF
          cat latest.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          # Flatten all bundle artifacts into one upload directory
          mkdir -p upload
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \
            -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \
            -o -name '*.msi.zip' -o -name '*.msi.zip.sig' \) -exec cp {} upload/ \;
          cp latest.json upload/
          ls -la upload/

          # Create the release on this repo and upload everything. GH_TOKEN
          # is the auto-provided GITHUB_TOKEN, scoped to this repo only.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Automated release of fisch-macro $VERSION" \
            upload/*
